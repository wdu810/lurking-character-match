<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0d0d0d;color:#d4c4a0;min-height:100vh;overflow-x:hidden}

h1{font-size:clamp(2.2rem,7vw,4.5rem);color:#c8a96e;text-shadow:0 2px 20px rgba(200,169,110,.3);margin-bottom:8px;text-align:center;letter-spacing:.1em}

.btn{background:transparent;border:1px solid #c8a96e;color:#c8a96e;padding:13px 40px;font-size:1rem;border-radius:2px;cursor:pointer;transition:all .4s;font-family:inherit;margin:10px;letter-spacing:.15em;position:relative;overflow:hidden}

.opts{display:flex;flex-direction:column;gap:10px;margin-top:20px}

.rcard{background:rgba(0,0,0,.3);border:1px solid rgba(200,169,110,.2);border-radius:4px;padding:clamp(25px,5vw,45px);max-width:620px;width:100%;text-align:center;position:relative}
.rcard::before,.rcard::after{content:"";position:absolute;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,rgba(200,169,110,.3),transparent)}
.rcard::before{top:0}.rcard::after{bottom:0}
.mpct{font-size:clamp(3.5rem,12vw,6.5rem);color:#c8a96e;font-weight:300;text-shadow:0 0 40px rgba(200,169,110,.3);letter-spacing:-.02em;line-height:1}
.mlbl{font-size:.75rem;color:rgba(200,169,110,.4);letter-spacing:.25em;margin:5px 0 20px}
.faction-tag{display:inline-block;font-size:.75rem;color:rgba(200,169,110,.5);border:1px solid rgba(200,169,110,.2);padding:3px 14px;border-radius:2px;letter-spacing:.1em;margin-bottom:12px}
.cname{font-size:clamp(1.8rem,5vw,2.8rem);color:#c8a96e;margin:8px 0;letter-spacing:.05em;font-weight:300}
.ctitle{font-size:.9rem;color:rgba(212,196,160,.5);letter-spacing:.1em;margin-bottom:20px;font-style:italic}
.reason{margin:20px 0;color:#a09070;line-height:1.9;font-size:clamp(.88rem,2.3vw,.98rem);text-align:left;background:rgba(0,0,0,.2);border-left:2px solid rgba(200,169,110,.3);padding:15px 18px;border-radius:0 2px 2px 0}
.story{margin-top:20px;text-align:left;line-height:2;font-size:clamp(.85rem,2.2vw,.95rem);color:#8a7a60;max-height:55vh;overflow-y:auto;padding-right:8px}
.story::-webkit-scrollbar{width:3px}
.story::-webkit-scrollbar-thumb{background:rgba(200,169,110,.2);border-radius:2px}
.story p{margin-bottom:1.2em}
.stitle{font-size:1.1rem;color:rgba(200,169,110,.6);text-align:center;margin-bottom:18px;letter-spacing:.1em}

.ld-wrap{text-align:center}
.ld{font-size:1rem;color:rgba(200,169,110,.6);letter-spacing:.3em}
.ld-bar{width:200px;height:1px;background:rgba(255,255,255,.1);margin:20px auto;position:relative;overflow:hidden}
.ld-bar::after{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:#c8a96e;animation:load 2.5s ease-in-out infinite}
@keyframes load{0%{left:-100%}100%{left:100%}}

.rbtn{background:transparent;border:1px solid rgba(200,169,110,.2);color:rgba(200,169,110,.5);padding:9px 28px;border-radius:2px;cursor:pointer;font-family:inherit;font-size:.85rem;margin-top:25px;transition:all .3s;letter-spacing:.1em}
.rbtn:hover{border-color:#c8a96e;color:#c8a96e}

@keyframes fi{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .5s ease-out}

.disclaimer{font-size:.65rem;color:rgba(255,255,255,.15);text-align:center;margin-top:30px;max-width:400px;line-height:1.8}
</style>

<div id="intro" class="screen active">
  <div class="tagline">同人创作 · 非官方</div>

  <button class="btn" onclick="start()">开　始　测　试</button>

</div>

<div id="quiz" class="screen">
  <div class="prog-wrap">
    <div class="prog-label"><span id="qn">第1题</span><span id="qt-count">共10题</span></div>
    <div class="prog"><div class="prog-bar" id="pb" style="width:0%"></div></div>
  </div>

<script>
const CHARS={yu_zecheng:{n:"余则成",g:"m",f:"中共地下党",tt:"最深的那道暗线",s:{"loyalty": 5, "bravery": 2, "rebel": 4, "wisdom": 9, "depth": 9, "morals": 5, "adventure": 1, "humor": 1},r:"你是一个外表平凡但内心藏着巨大力量的人。你最厉害的本事不是锋芒毕露，而是在所有人都忽略你的时候，默默做着最重要的事。你忠诚到近乎固执，聪明到可以骗过所有人。你选择了最孤独的那条路，因为你相信黎明之前必须有人守在黑暗里。",tb:"你第一次见到余则成，是在一场不该举办的晚宴上。\n\n那是天津站的迎新酒会。新来的情报官员、本部派驻的联络员、以及一群穿着各色礼服的太太们，挤在一个灯光昏黄的客厅里，互相说着没有营养的废话。\n\n你站在靠窗的位置，看着窗外的街道，只想着怎么早点离开。\n\n然后你注意到了他。\n\n不是因为他英俊。是因为他是整个房间里唯一一个没在说话的人。他端着酒杯，站在人群的边缘，脸上挂着一个恰到好处的微笑——不太热情，不太疏离，像是精心校准过的刻度。\n\n你见过很多特工。你知道那种刻度背后是什么。\n\n「你也不喜欢这种场合？」你走过去，开口了。\n\n他转过头看你。那一眼让你微微一愣——他的眼睛太平静了，平静得像一口深井，让你看不到底。\n\n「我习惯了。」他说。\n\n这个回答比「不喜欢」更让你不安。\n\n习惯了——不是接受了，不是无所谓了，是习惯了。一个人要把多少东西压下去，才能对「习惯了」这两个字说得这么平静？\n\n你们就这样开始的。没有刻意的接近，没有精心设计的邂逅。只是两个在同一个部门工作的人，在需要对接工作的时候出现在彼此的视野里。\n\n但你开始注意到一些事。\n\n他每次来汇报工作，说的和实际汇报的内容之间，总会有一些微妙的空白。不是隐瞒——是留白。他把所有该说的都说了，但你能感觉到，在那些留白的地方，还有很多他没有说的东西。\n\n你没有追问。你们这行，不该问的不问，这是规矩。但你开始很想知道，那些留白里装的是什么。\n\n——\n\n第一次真正意义上的交谈，是在一个起了大雾的清晨。\n\n你们都习惯早到。那天你去得特别早，发现他已经坐在走廊上，手里捧着一个搪瓷杯，出神地看着窗外的雾。\n\n「睡不着？」你在他旁边坐下来。\n\n「睡着了，」他说，「但醒了。」\n\n「梦到什么了？」\n\n「以前的事。」\n\n你看着他的侧脸。雾气把窗外的世界变成了一片灰白，他的脸在那种光线里显得有些模糊，像是一张没有完全显影的照片。\n\n「你来天津多久了？」\n\n「三年了。」\n\n「习惯吗？」\n\n他转过头看你，嘴角动了一下，像是想笑，但没有笑出来。「你刚才说习惯了，我说习惯了。」\n\n「我是问你，真的习惯了吗？」\n\n他看了你很长时间。「没有，」他最终说，「但不习惯也没用，所以就假装习惯了。」\n\n这是他第一次对你说真话。你能感觉到。当一个把所有东西都压在最深处的人，忽然说出一句真话的时候，它落下来的重量和一句假话完全不同。\n\n你没有说什么多余的。你只是坐在那里，陪着他把那杯茶喝完，然后各自去了自己的办公桌。\n\n但从那天起，什么东西开始不一样了。\n\n——\n\n三个月后的一个傍晚，他来找你。不是例行的工作汇报，是他拿着一份文件，在你的办公桌前站了一会儿，然后说：「你有没有空，我想谈点事。」\n\n「什么事？」\n\n「不是工作上的。」他顿了一下，「是关于我的。」\n\n你放下手里的钢笔。「说吧。」\n\n他坐到你对面，把文件夹放在桌上，但没有打开。他看着那个文件夹，说了一句让你一时没反应过来的话：\n\n「你知道吗，在这个地方做这件事最难的是什么？」\n\n「什么？」\n\n「不是危险，不是孤独，不是随时可能暴露。」他抬起眼睛看你，「是你必须骗所有你在乎的人。为了骗好他们，你必须先骗自己。骗久了，你就开始分不清，哪些话是真的，哪些是假的。」\n\n你听出了他在说什么。不是在说工作，是在说他自己。\n\n「那你现在说的，是真的还是假的？」你问。\n\n他看着你，沉默了很久。\n\n「是真的，」他最终说，「我跟你说的，是真的。」\n\n那一刻，你忽然明白了一件事。他并不是个冷漠的人。恰恰相反——他是个太容易受伤的人，所以才要把所有东西都藏得那么深，用那个「恰到好处的微笑」挡在自己和世界之间。\n\n而他今天来找你，不是因为你是他的同僚，不是因为你可以帮他解决什么问题。\n\n是因为在这个他认识的所有人里，你是唯一一个让他觉得可以不用骗的人。\n\n你没有说任何安慰的话。安慰不是他需要的。你只是说：「那我现在跟你说的，也是真的。」\n\n「什么？」\n\n「你不需要每次都装作习惯了。不用一直绷着。」你看着他，「至少在这里，不用。」\n\n他愣了一下，然后低下头，用手指轻轻敲了敲那个文件夹。\n\n「为什么？」他的声音很低，「你凭什么相信我？」\n\n「因为一个会问「你真的习惯了吗」的人，大概不会骗人骗得心甘情愿。」\n\n他沉默了很长时间。窗外天津的冬夜开始降温，走廊里有暖气管在轻微地嗤嗤作响。他终于抬起头来看你，那双一贯深不见底的眼睛里，有什么东西松开了一点点。\n\n——\n\n后来的日子里，你们之间有了一个不成文的默契。\n\n他不再只是来汇报工作，有时候会在你的办公室坐一会儿，说一些工作以外的事——不多，但都是真的。你也不再只是听，偶尔也说一些自己的事，让他知道你不是只在等他开口的那个人，你也有你自己的重量。\n\n有一次，他突然问你：「你怕吗？」\n\n「怕什么？」\n\n「怕有一天，这一切都崩了。」\n\n你想了一想。「怕。」\n\n「那你还做？」\n\n「因为怕了还是做，才叫勇气。」你看着他，「你也一样，对不对？」\n\n他没有回答。但他的眼睛里有什么东西动了一下。\n\n那个东西叫做：被看见了。\n\n——\n\n最后一次见面，是在一个平常的午后。\n\n他来找你，说要借一本书。但你们都知道那不是真正的理由。\n\n他拿到书，把它翻了翻，然后把它放在腿上，看着你，说：「我可能要走了。」\n\n「去哪里？」\n\n「不知道。」\n\n「什么时候回来？」\n\n「不知道。」\n\n两个「不知道」。你听懂了它们背后的意思。\n\n你沉默了一会儿，然后站起来，走到书架前，取下另一本书，放在他手上。\n\n「这本也一起带着。」\n\n他低头看了看那本书的书脊，然后抬起头。「为什么？」\n\n「因为两本总比一本好，」你看着他，「万一走得太久，一本不够看。」\n\n他看着你的眼睛，看了很久，然后笑了——不是那个恰到好处的、校准过的微笑，是一个真的笑，有点苦，有点暖。\n\n「好，」他说，「我带着。」\n\n他走到门口的时候，你叫住了他。\n\n「余则成。」\n\n他回头。\n\n「那天你说，你跟我说的是真的。」你说，「我信你。」\n\n他看着你，沉默了几秒钟，然后点了点头。轻轻的，一下。\n\n然后他走了。\n\n你站在原地，看着他离开的方向，看了很久。\n\n在这个所有人都必须骗所有人的地方，他对你说了真话。\n\n而那两句真话，比你听过的所有誓言都重。"},cuiping:{n:"翠平",g:"f",f:"中共游击队",tt:"最真的伪装",s:{"loyalty": 5, "bravery": 9, "rebel": 2, "wisdom": 1, "depth": 2, "morals": 7, "adventure": 8, "humor": 9},r:"你是个直来直去的人，学不会拐弯抹角，也不屑于假装。你最大的魅力就是真实——在这个人人都在演的世界里，你的粗糙和笨拙反而成了最可靠的力量。你不需要变得精致，因为你本身就足够强大。",tb:"你第一次见到余则成，是在一个你完全不认识的地方。\n\n天津卫的火车站。你提着一个破旧的包袱，穿着一件不合身的棉袄，站在站台上不知所措。有人告诉你，到了天津，找一个姓余的人。\n\n他在人群中举着一块牌子。上面写着你的名字——一个假的名字。\n\n你走过去。他看着你，你看着他。\n\n你一眼就看出来了：这个人不是你想象中的那种人。他不像是来接你这位\"太太\"的丈夫。他更像是——怎么说呢——在执行一项任务。\n\n\"你叫翠平？\"他问。\n\n\"嗯。\"你应了一声，上下打量他。\n\n他穿得不错，一身得体的西装，头发梳得一丝不苟，手里拿着一块手帕，不时地擦一擦额头。他笑的时候嘴角弯得很规矩，像是练过的。\n\n\"走吧，\"他说，\"回家。\"\n\n你跟着他走了。\n\n——\n\n到了那个\"家\"，你发现它比你想的还要陌生。\n\n不是破旧，是太精致了。家具是洋式的，地毯是进口的，墙上挂着画，书架上摆着书——这些你一样都不认识。你站在客厅中间，觉得自己像一只被放进鸟笼的麻雀，格格不入。\n\n\"以后这里就是你的家。\"他说。\n\n\"我的家？\"你看了看四周，\"我不认识这些东西。\"\n\n\"慢慢就认识了。\"\n\n\"那我干什么？\"\n\n他看着你，想了想。「做我的太太。」\n\n你愣住了。不是因为害羞——是因为你觉得这事太荒唐了。\n\n你，一个从黄土地上来的农村姑娘，连字都不认识几个，要做这个穿西装、说洋话的人的太太？\n\n\"我做不来。\"你说。\n\n\"不是真的做，\"他说，\"是假装做。\"\n\n\"假装？」你皱起眉头，「怎么假装？」\n\n「你不需要做什么特别的。就是……跟我住在一起。别人来的时候，叫我丈夫。别人走的时候，该做什么做什么。」\n\n「那你呢？」\n\n「我叫你太太。」他说。\n\n你就这样开始了。\n\n——\n\n最开始的日子，你觉得别扭。\n\n不是因为这个房子——虽然你确实不太会用那些洋玩意儿。是因为他。\n\n余则成这个人，客气到让你觉得远。他每天早上跟你打招呼，用一种你听不太懂的方式——不是\"早\"，是\"早上好\"。他吃饭的时候坐得端端正正的，夹菜用公筷，吃完把碗筷摆成一条线。他睡觉前会把外套叠好放在椅子上，把鞋子摆正放在床边。\n\n你觉得这不是过日子。这是演戏。\n\n有一天你实在忍不住了。\n\n「你能不能好好说话？」\n\n他愣了一下。「我怎么说的？」\n\n「你说「早上好」，说「请」，说「谢谢」。这些话说得像是从书上学来的，不是从心里说出来的。」\n\n他看着你，沉默了一会儿。\n\n「那你希望我怎么说？」\n\n「你就说「早」，说「来」，说「嗯」。」你掰着手指头数，「这样。」\n\n他沉默了一会儿，然后说了一句让你意外的话。\n\n「好。」\n\n从那之后，他开始变了。\n\n不是全变——他还是那个余则成，那个把外套叠好、把鞋子摆正的人。但他开始用你说的「嗯」来代替「谢谢」，开始用「早」来代替「早上好」。\n\n他开始像一个「真的」丈夫，而不是一个「假装」的丈夫。\n\n——\n\n后来你发现了一件事。\n\n余则成不是不在乎你——他是不知道该怎么在乎。\n\n他不是那种会表达感情的人。他不会说「你今天真好看」，不会在你做饭的时候夸你一句「好吃」，不会在你生病的时候握住你的手说「别怕」。\n\n但他会用别的方式。\n\n比如，他会默默地把你用不惯的洋式茶壶换成你熟悉的土陶壶。\n\n比如，他会在你做饭的时候，不动声色地站在厨房门口，看着你忙来忙去。\n\n比如，他会在你睡着之后，把你的被子掖好。\n\n这些都不是「假装」的事。假装不需要做这些。\n\n他做这些，是因为他在乎你——只是他不知道怎么说出来。\n\n——\n\n有一天晚上，你醒来的时候，发现他坐在床边。\n\n不是坐在床沿，是坐在床边的椅子上，看着你。\n\n「你干什么？」你迷迷糊糊地问。\n\n「没干什么。」他说。\n\n「你没睡？」\n\n「嗯。」\n\n「为什么不睡？」\n\n他没有回答。\n\n你又问了一遍。\n\n他沉默了很久，然后说了一句话。一句你后来想了很久的话。\n\n「因为你在。」\n\n你当时没有完全听懂。但你现在懂了。\n\n他不是在说「因为你在，所以我睡不着」。\n\n他是在说：「因为你在，所以我不需要一个人了。」\n\n——\n\n你们的关系是什么时候从「假装」变成「真的」的？\n\n你不知道。没有一个明确的时刻。是一点一点变的。\n\n是你发现他开始在别人面前自然地握住你的手的时候。\n\n是他发现你开始在他不在家的时候等他回来的时候。\n\n是你们发现彼此开始说「我们」而不是「你和我」的时候。\n\n——\n\n战争结束之后，有一次你问他。\n\n「你说，我们最开始是假装的，对吧？」\n\n「对。」\n\n「那什么时候变成真的了？」\n\n他想了很久，久到你以为他不想回答。\n\n「我不知道，」他最终说，「可能是你不让我说「早上好」的那一天。」\n\n你笑了。「就那一天？」\n\n「不是就那一天。」他看着你，「是从那一天开始的。」\n\n你靠在他的肩膀上。\n\n翠平不是那种会写诗的女人。她不会用漂亮的词来形容爱情。她只会用最直接的方式去爱——做饭、等门、掖被子。\n\n但余则成是那种会把「早上好」换成「早」的人。\n\n是因为她说的。\n\n不是因为应该。\n\n是因为她说的。\n\n这就是你们之间的爱情——不是从海誓山盟开始的，是从一句「你好好说话」开始的。\n\n一个从不说真话的人，开始对一个农村姑娘说真话。\n\n一个从不说「爱」的人，用一辈子去证明。"},li_ya:{n:"李涯",g:"m",f:"军统天津站",tt:"站在错的一边的孤狼",s:{"loyalty": 9, "bravery": 5, "rebel": 1, "wisdom": 3, "depth": 4, "morals": 4, "adventure": 3, "humor": 1},r:"你是那种一旦认准了方向就绝不回头的人。你的执着让人敬佩也让人害怕。你不是坏人，你只是太相信自己的判断了。你的悲剧在于：你的能力配得上你的野心，但你选错了阵营。",tb:"你第一次见到李涯，是在一次讨论会上，他和你当场吵了起来。\n\n不是那种绅士地各持己见的讨论，是真的吵，声音大到让旁边的人都停下来看。\n\n起因是一份报告里的数据分析方法。他觉得你的方法有漏洞，你觉得他的判断缺乏依据。谁都不让谁。\n\n最后主持人宣布休会，你们两个在门口站着，互相都不看对方。\n\n「你的分析框架是对的，」他突然开口，声音平得像是在念一份备忘录，「但你少考虑了一个变量。」\n\n你转过头看他。「哪个变量？」\n\n「人，」他说，「你的框架里，人的行为是可以预测的。但人不是机器。」\n\n你愣了一下。「你是说，我的框架本身正确，但应用的时候……」\n\n「应用的时候必须有更大的容错空间。」他终于看了你一眼，「你应该知道的。」\n\n你不知道该生气还是觉得他说得有道理。最后你什么都没说，转身走了。但那天晚上你一个人把那份报告重新看了一遍，把那个「变量」加进去，发现结论确实变了。\n\n——\n\n你没有去找他道谢。那不是你们之间该有的来往方式。但从那次争论之后，你开始更认真地看他。\n\n他是一个让你觉得难以捉摸的人。他的判断极其精准，有时候精准到让人后脊发凉——像是他能看到别人看不到的东西。但他同时又是一个极端孤独的人，不是那种「我不需要任何人」的孤独，是那种「我不知道怎么让任何人留下来」的孤独。\n\n他永远是第一个到办公室的人。他的桌上永远没有任何私人物品——没有照片，没有小摆件，什么都没有。他吃饭从来不和别人一起。不是傲慢，是习惯了。\n\n有一次你在茶水间遇到他，他正在等热水烧开，站在那里，眼神放空地看着前方。\n\n「你在想什么？」你问。\n\n他回过神来看你，没有回答你的问题，而是问你：「你相信一件事可以同时是对的又是错的吗？」\n\n「什么意思？」\n\n「一件事，从某一个角度来看是完全正确的，从另一个角度来看又是完全错误的。」他说，「你相信这种事存在吗？」\n\n你想了想。「相信。」\n\n「那做这件事的人是对的还是错的？」\n\n你看着他。「你在说你自己。」\n\n他没有否认。他只是低头看着那壶水，水已经烧开了，但他没有动。\n\n「有时候，」他说，声音比水声还轻，「我真的不知道。」\n\n那是你第一次觉得，他不是你以为的那种人。你以为他是那种认定了什么就绝对不回头的人。但他在怀疑。他一直在怀疑。只是在所有人面前，他把那个怀疑藏得很深。\n\n——\n\n后来有一段时间，你们的工作重叠增加，对接变得频繁。\n\n你发现他其实并不是不会说话，而是不愿意说废话。一旦他认为有价值的内容，他会讲得非常详细、非常清晰，思路之严密让你几乎挑不出漏洞。\n\n「你怎么能把一件事想得这么清楚？」有一次你忍不住问他。\n\n「因为如果我不想清楚，」他说，「我不知道我在做什么。」\n\n你听懂了这句话的两层意思。一层是字面意思。另一层是：他需要「想清楚」这件事来支撑他继续前进，因为如果停下来不想清楚，他可能没有办法继续做他正在做的事。\n\n「你有没有想清楚过一件事，」你轻轻问，「然后发现，想清楚之后反而更难？」\n\n他停住了。「每天都有，」他说。然后他看向你，表情里有一种你以前从未见过的东西——真实的疲惫。\n\n「但还是得想，」他说，「不想的人才是真的输了。」\n\n你没有说话。你只是坐在那里，让他知道你听到了，听进去了。有时候，不说话是最好的回应。\n\n——\n\n有一天你们工作到很晚，最后一趟班车已经走了。他说他送你。你没有拒绝。\n\n你们在空荡荡的街道上走了很长的路。天津的冬夜又冷又黑，风从海河那边吹过来，带着一股腥咸的味道。\n\n他没说话。你也没说话。\n\n但走到一半的时候，你忽然注意到他走路一直走在你靠近马路的那一侧。\n\n不是偶然的。是一直都是。\n\n你没有说破。有些事说出来就会变味，不如就这样，各自明白，各自不说。\n\n到了你住的胡同口，你们停下来道了声晚安。他说他先走了，转身就走。\n\n「李涯。」你叫了他。\n\n他回头。\n\n「你刚才说，想清楚了反而更难。」你说，「你现在想清楚了吗？」\n\n他看着你，沉默了几秒钟。\n\n「有一件事，」他说，「我想清楚了。」\n\n「什么？」\n\n他没有直接回答，只是说了一句：「它比我以前以为的更值得。」\n\n然后他转身走了，消失在黑夜里，没有回头。\n\n你站在胡同口，在冷风里站了一会儿，然后慢慢地笑了。\n\n不是因为你完全听懂了他在说什么。而是因为，一个从不说废话的人，说了一句你听不完全懂的话，那说明他想说的，比他说出来的要多得多。\n\n而那些多出来的部分，才是他真正想告诉你的东西。\n\n——\n\n李涯是这个世界上最难相处的人之一。他不温柔，不体贴，不会在你需要安慰的时候说「没事的」。他会在你犯错的时候直接指出来，不留情面。他会在他认为你错了的时候和你当场争论，不管场合。\n\n但他也是这个世界上最真实的人之一。他说的每一句话都是他真实相信的，他做的每一件事都有他认为正确的逻辑。他不欺骗，不敷衍，不会用漂亮的话掩盖他真实的想法。\n\n和他在一起，你永远不会被当成傻瓜。也永远不会被保护得什么都不知道。\n\n他把你当成一个能够承受真相的人。\n\n而对你来说，那比任何温柔都珍贵。因为真正的尊重，从来不是把你放在玻璃罩里，而是相信你能够和他一起，面对那些想清楚了反而更难的事情。"},wu_jingzhong:{n:"吴敬中",g:"m",f:"军统天津站长",tt:"看透一切的老狐狸",s:{"loyalty": 1, "bravery": 1, "rebel": 3, "wisdom": 9, "depth": 7, "morals": 1, "adventure": 2, "humor": 5},r:"你是那个在房间里最清醒的人。你看透了所有人的把戏，但你选择不动声色。你的智慧不是用来改变世界的，是用来保护自己的。你比任何人都清楚这个游戏的规则，所以你是活得最久的那个。",tb:"你第一次见到吴敬中，是在他已经把你看透之后。\n\n那是天津站的一次内部会议。他坐在主位上，手里夹着烟，眼神漫不经心地扫过每一个人。轮到你发言的时候，你刚说了两句，他忽然开口打断：「你说的是对的，但你心里没底。」\n\n你愣了一下。\n\n「坐。」他朝你点了下头，示意你坐下，「后面的事我来安排。」\n\n会议结束后你一个人站在走廊里，心里有些发毛。因为你从来没说过「心里没底」，你甚至觉得自己掩饰得很好。\n\n显然，在他面前，你藏得一点都不好。\n\n——\n\n后来的接触让你发现，他看人的方式有一种很特别的东西。\n\n不是那种显而易见的「分析」——他不会像某些人那样盯着你看，仿佛在一条一条地解读你的行为。他的方式更像是水，悄无声息地渗进来，等你发现的时候，他已经知道了一些你不记得告诉过他的事。\n\n「你最近睡得不好。」有一天他在走廊里碰到你，随口说了一句。\n\n「您怎么知道？」\n\n「你左眼下面有一条浅纹，是连续几天没睡够的时候才有的。」他说，然后平静地转换了话题，「对了，下午的情报……」\n\n你坐在那里，一边听他安排工作，一边想着刚才那句话。\n\n他注意到了你眼睛下面的纹。不是出于关心——或者说，不全是——是他就是一个会注意到这种事的人。这反而让你有点不自在，也有点安心。\n\n不自在是因为：你发现自己对他来说几乎是透明的。\n\n安心是因为：他注意到了，但他什么都没说，只是转换了话题，好像那条浅纹什么都不意味着，好像他知道了但不需要你解释。\n\n你不需要假装睡得很好。他已经知道你没睡好，但他不需要你承认这件事。\n\n——\n\n有一次，你在他的办公室谈完工作，正要起身，他忽然说了一句让你停在那里的话。\n\n「坐。还有一件事。」\n\n你坐下来，等他说。\n\n他把手里的文件放下来，把烟掐掉，然后靠在椅背上，打量了你一会儿。\n\n「你有没有想过，」他最终开口，「你在这里做的事，值不值得？」\n\n这个问题问得很突然，也很奇怪。\n\n「站长……」\n\n「不是在考你。」他摆了摆手，「是我自己也在问这个问题。我不知道答案。我只是好奇，你的答案是什么。」\n\n你看着他。\n\n吴敬中是你见过的最难以捉摸的人之一。他永远让人觉得他在算计什么，永远让人觉得他说的每一句话背后都有另一层意思。但此刻他看着你的方式，你觉得，他问的是真的。\n\n「值得，」你说，「但不是因为大道理。是因为我想让某些事发生，或者不发生。」\n\n他看了你一会儿，然后点了点头，像是把你的答案在心里记下来了。\n\n「你比我认为的更诚实。」他说。\n\n「您比我认为的更认真地在问这个问题。」你回了一句。\n\n他愣了一下，然后轻声笑了。不是那种打哈哈的笑，是一个真实的、有点意外的笑。\n\n「好，」他说，「那我们都算是答了真话。」\n\n——\n\n有一个下着大雪的傍晚，他来找你。\n\n不是叫你去他的办公室，是他自己走到了你这里，站在门口，说：「出去走走？」\n\n你们在附近的街道上走了很长一段路。雪还在下，路灯把雪光染成了暖黄色。\n\n他没有一开始就说话。他就那样走着，你跟着，偶尔有人力车夫踩着车铃骑过去，除此之外非常安静。\n\n「你知道我最怕的是什么吗？」走了一会儿，他开口了。\n\n「什么？」\n\n「不是被人背叛，不是大势已去，不是走错了路。」他说，脚步没有停，「是到最后，不知道自己究竟在乎什么。」\n\n你走在他旁边，听着他的声音，觉得那种声音和平时他说话的方式完全不同——平时的他是精准的、有分寸的、永远留着余地的。但此刻，他说话的方式有一种你只有在他放下所有那些分寸之后才能听到的东西。\n\n「那您在乎什么？」你问。\n\n他走了几步，然后停下来，站在一盏路灯下，转头看你。\n\n「不知道。」他说，「这就是我最怕的。」\n\n雪落在他的肩膀上，他没有去掸，就那样站着，看着你。\n\n「但现在，」他说，「我在乎这一刻。」\n\n你没有说话。你就那样站在雪里，看着他，让那个「一刻」在你们之间慢慢沉下去，沉进那个下雪的傍晚里，沉进那盏路灯的光里。\n\n——\n\n吴敬中是一个你永远无法完全了解的人。他太深了，太复杂了，太多层了。你剥开一层，下面还有另一层。你以为你看懂了他，结果发现你只是看懂了他让你看懂的那一面。\n\n但在那个雪天的傍晚，在那盏路灯下，他说「我在乎这一刻」的时候，你知道——\n\n那一层是真的。\n\n不是他让你看懂的那一层。是他自己都没有完全看懂的那一层。\n\n而那一层，属于你们两个人。\n\n那场雪之后，你发现他变了。\n\n不是大变——他还是那个吴敬中，那个坐在办公室里抽烟、用两秒钟看穿你心思的人。但有些细微的东西不一样了。\n\n比如，他会在走廊里碰到你的时候，多停留一秒钟。不是有话要说的那种停留，是那种「看到你之后觉得挺好」的停留。\n\n比如，他会在开会的时候，在你发言的时候，不再像以前那样漫不经心地敲烟灰——而是真的在听。\n\n比如，他有一次在批一份文件的时候，看到你经过，叫住了你。\n\n「等一下，」他说，「这个你来看一下。」\n\n你走过去，站在他旁边。\n\n「这个人的情报，你觉得可信吗？」他指着一份文件上的一行字。\n\n你看了看。「可信度不高。」\n\n「为什么？」\n\n「因为写得太完美了。」你说，「一个完美到没有任何瑕疵的情报，反而说明它可能是编的。」\n\n他看着你，然后笑了。\n\n「你看，」他说，「这就是我为什么要叫你来看。」\n\n你愣了一下。\n\n「因为你的答案，」他看着你的眼睛，「从来不在文件上。在你心里。」\n\n这句话比任何表扬都让你心动。因为你知道——他不是随口说的。他是一个把每一句话都掂量过的人才开口的人。\n\n而他说了这句话，就意味着他是认真的。"},lu_qiaoshan:{n:"陆桥山",g:"m",f:"军统情报处处长",tt:"困在野心里的聪明人",s:{"loyalty": 2, "bravery": 3, "rebel": 6, "wisdom": 5, "depth": 4, "morals": 1, "adventure": 4, "humor": 5},r:"你聪明、有野心，但总是差那么一口气。你知道太多，反而把自己困住了。你擅长收集信息但不擅长做决定。你最大的敌人不是别人，是你自己的犹豫和不甘。",tb:"你第一次注意到陆桥山，是因为他在一个所有人都在说假话的场合，说了一句让你意外的真话。\n\n那是一场例行的工作汇报会。按照惯例，大家轮流说一些让上面高兴的话，没有人真的在谈工作。\n\n轮到陆桥山的时候，他清了清嗓子，然后说：「上个月的情报误判，责任在我。是我的分析方向出了问题。」\n\n整个房间里安静了一秒钟。\n\n没有人在这种场合说这种话。你不说真话，当然也不说假话——你说的是「可能存在改进空间」这类什么都没说的话。但陆桥山直接说了「责任在我」。\n\n你看向他。他正在整理面前的文件，表情平静，像是刚才说的只是天气。\n\n会后你走到他旁边。「你刚才为什么这么说？」\n\n他侧过头看你。「因为是真的。」\n\n「你不怕……」\n\n「你想说『不怕吗』，」他接住了你没说完的话，「但你没问完，是因为你知道我怕。」\n\n你愣了一下。\n\n「我怕，」他继续说，「但我更讨厌自己说了假话却觉得理所当然。所以我宁可说真话，然后去承担后果。」\n\n你看着他，觉得这个人和你认为的不太一样。\n\n——\n\n后来你们的工作有了很多交集。\n\n你发现他是一个很有意思的组合体——他有很强的野心，这不是秘密，整个部门都知道他想往上走。但他同时又是一个对「怎么往上走」有自己的标准的人，他不愿意走那些他觉得站不住脚的捷径。\n\n「你为什么不……」有一次你忍不住问他。\n\n「为什么不走那条路？」他接住了你没说完的问题，「因为如果我走了那条路，我就变成了我自己讨厌的那种人。」\n\n「但那条路更快。」\n\n「快有什么用，」他说，「走到终点回头看，发现自己成了不认识的人，那算什么赢？」\n\n你看着他，忽然觉得有点心疼。不是那种「可怜他」的心疼，是那种「我理解这种为难」的心疼——一个有野心的人，但对自己的野心设了很多条件，所以走得比别人慢，也比别人累。\n\n「你会后悔吗？」你问。\n\n他想了想。「会。」\n\n「那你还坚持？」\n\n「如果因为会后悔就不坚持，那我岂不是认定了我将来会做错误的选择。」他说，「我宁可认定我不会。」\n\n这个逻辑绕了一圈，但你听明白了。\n\n他在用一种很别扭、但属于他自己的方式，对自己保持信心。\n\n——\n\n你们第一次真正意义上的私下对话，是在一次部门聚餐之后。\n\n聚餐喝了酒，但不多。你们俩都是有分寸的人。最后剩下你们两个，慢慢走回各自的驻地。\n\n「你为什么进这一行？」他忽然问你。\n\n「为什么这么问？」\n\n「你不像其他人。」他说，「大多数人进来，要么是为了钱，要么是为了上升，要么就是没别的路了。你不是这几种里的哪一种。」\n\n你沉默了一会儿。「因为我想做一些，将来回头看的时候，觉得没白在这个地方待过的事。不一定是大事，就是……觉得值的事。」\n\n他走了几步，然后说：「我也是这样。」\n\n「我知道。」\n\n他看向你。「你怎么知道？」\n\n「因为你刚才说，如果走了那条路，就会变成自己讨厌的那种人。」你说，「一个纯粹为了野心的人，不会有『自己讨厌的那种人』这个概念。」\n\n他沉默了一会儿，然后突然笑了起来。那个笑很真实，有一点点被看穿之后的不好意思，但更多的是一种被理解了的松动。\n\n「你很厉害，」他说，「我早就知道你厉害，但我没想到你厉害到能说出来。」\n\n「因为你说了真话，所以我也说。」\n\n他看着你，那个笑慢慢沉淀，变成了一种你以前从来没在他脸上见过的表情——安静的，放松的，像是一个一直绷着的人，终于把那根弦松了一点点。\n\n「谢谢你。」他说。\n\n「谢什么？」\n\n「谢你不觉得我的标准是矫情。」\n\n你摇了摇头。「不矫情。是你的标准，你对自己的规矩，很好。」\n\n他没有再说话，但你们两个的脚步都慢下来了，走得比之前更慢，像是都不想太快走到终点。\n\n——\n\n陆桥山是这样一个人——他有足够的能力做很多事，但他对自己的「能做」设了很多条件，所以他做的比他能做的要少，也比别人以为的他会做的要少。\n\n有人觉得那是他的局限。你不这么觉得。你觉得那是他的脊梁骨。\n\n有脊梁骨的人，站的时候很直，但也很容易累。所以他需要偶尔有人在旁边，不是帮他站，而是让他知道，他在坚持的东西，是值得的。\n\n而你，恰好是愿意这样告诉他的人。\n\n那次聚餐之后的第二天，你发现你的办公桌上多了一本书。\n\n不是新书——是旧书，书角已经磨圆了，书页发黄，像是被人读过很多遍。你翻开书，发现里面有很多用铅笔做的批注，字迹很工整。\n\n书的最后一页夹着一张纸条：「你上次说的那个问题，我在书里找到了一个有意思的答案。你看看第三章。」\n\n你没有问他是怎么找到这本书的，也没有问他为什么要送你。你直接翻到第三章，坐在那里看了一个下午。\n\n书里说的不是什么大道理，只是一个小故事——关于一个在十字路口犹豫了很久的人，最终选择了一条不那么容易走的路。\n\n你把书合上，靠在椅背上，笑了。\n\n因为你知道，他送你这本书，不是因为他觉得你需要答案。\n\n是因为他觉得你不需要别人给你答案——你只需要知道，有人和你站在同一个十字路口。\n\n——\n\n陆桥山不是那种会在你面前展示脆弱的人。他的野心、他的标准、他对自己的要求，这些是他最坚硬的部分。但在这些坚硬的东西下面，有一个他自己都不太愿意承认的东西——他害怕。\n\n不是怕失败，不是怕升不上去，不是怕被人超过。\n\n是怕有一天，他回头看，发现自己走过的路，都不是他自己选的路。\n\n所以他给自己设了很多标准。所以他宁可走得慢一点。所以他在那个所有人都说假话的场合里，说出了那句「责任在我」。\n\n而他送你的那本书，就是他对你说的最接近「我相信你」的一句话。"},ma_kui:{n:"马奎",g:"m",f:"军统行动队长",tt:"被怀疑吞噬的硬汉",s:{"loyalty": 4, "bravery": 9, "rebel": 1, "wisdom": 1, "depth": 2, "morals": 4, "adventure": 8, "humor": 2},r:"你是个行动派，说话做事都直来直去。你不喜欢弯弯绕绕，但这个世界偏偏充满了弯弯绕绕。你的忠诚是纯粹的，但也正因为这份纯粹，你最容易受伤。",tb:"你第一次见到马奎，是他正黑着脸训斥一个下属的时候。\n\n声音很大，站在走廊外面都能听见。你没有进去，等了一会儿，等那个下属低着头走出来，你才推开门。\n\n他还站在那里，拿着一份文件，表情已经从刚才的火气沉淀下来，变成了一种沉沉的、你一时读不出来的表情。\n\n「马科长。」你说。\n\n「你来得正好，」他说，把手里的文件递给你，「看一下这份报告，有没有什么问题。」\n\n你接过来，翻了翻。「训他什么？」\n\n他沉默了一下。「一份情报漏报了，差点出了大事。」\n\n「他是故意的？」\n\n「不是。」\n\n「那就是能力问题，不是态度问题。」你说，把文件放在他的桌上，「用训斥处理能力问题，效果不好。」\n\n他看着你。你以为他要反驳，但他没有。\n\n「你说得对。」他说，「但我当时控制不住。」\n\n你没想到他会这么说。\n\n「为什么控制不住？」\n\n「因为那份漏报的情报，差一点连累了一个不该连累的人。」他说，然后不再看你，转过身去看着窗外，「我不允许这种事发生在我的人里面。」\n\n你听懂了他话里的意思。他在乎他手下的人。他训那个下属，不是因为他觉得那个下属该被训，而是因为他害怕——害怕因为自己部门的疏漏，让别人付出不该付出的代价。\n\n这是一种很别扭的在乎方式，但它是真实的。\n\n——\n\n你注意到他的一个习惯。\n\n他是整个部门里最后一个离开办公室的人。\n\n不是因为他工作量最大——他的工作效率很高。他留到最后，是因为他要等到确认所有人都离开了，确认没有任何遗留的问题，才会走。\n\n有一次你加班到很晚，走出楼道的时候，看到他还在，坐在半黑的办公室里，盯着一张桌子发呆。\n\n「马科长。」你敲了敲门框。\n\n他回过神来，看到你，有一点意外。「你还没走？」\n\n「刚要走。」你进去，坐在他对面，「你在想什么？」\n\n「没想什么。」\n\n「没想什么的人不会这个表情。」\n\n他沉默了一会儿，然后说：「你有没有被人怀疑过？」\n\n你愣了一下。「什么意思？」\n\n「就是，你做了什么，说了什么，被人盯着，被人疑神疑鬼，被人觉得你可能是……」他停了一下，「反正就是被怀疑过。」\n\n你看着他，忽然听出了那句话背后的意思。\n\n「是有人在怀疑你？」\n\n他没有回答，但他也没有否认。\n\n「那很难受。」你说。\n\n「是。」他说，然后抬起眼睛看你，那双眼睛里有一种很复杂的东西，「最难受的不是被怀疑。是你不知道该不该去解释，因为越解释，有时候越像是心虚。」\n\n你懂他说的这种处境。那是一种特别无力的处境——你知道自己没有问题，但你没法证明，而你越急着证明，就越显得你在意那个证明。\n\n「那你怎么做？」你问。\n\n「继续做该做的事。」他说，「等着看。」\n\n「不委屈吗？」\n\n「委屈。」他说，很平静，「但委屈没用。委屈了也过不去。不如先把事做了，其他的事往后放。」\n\n你看着他。\n\n他是那种你第一眼会觉得「难相处」的人——声音大，态度硬，说话直来直去。但你现在坐在他对面，听他说「委屈没用」，看他把一切压在那个沉沉的表情下面，不动声色地继续坐在那里，忽然觉得，他其实是最需要被人看见的那种人。\n\n因为他从来不说自己需要什么。\n\n「你身边有人吗？」你问，「说话的那种。」\n\n他停住了，看着你。「说话？」\n\n「对，」你说，「你说委屈没用，但有时候说出来，也有点用。有人吗？」\n\n他盯着你，盯了很长时间，然后缓缓地摇了摇头。「没怎么有过。」\n\n「那现在有了。」你说，「如果你想说。」\n\n他看着你，沉默了好一会儿。然后他说了一句话，声音很低，低到你几乎要凑近才能听清：\n\n「你不怕连累？」\n\n「你是好人。」你说，「不会连累。」\n\n他没有说话，低下头，用手掌按了按额头，像是在隐藏什么。然后他站起来，拿起外套，说：「走吧，送你一段路。」\n\n你站起来，跟他出去了。\n\n你们走了很长一段路，他送你到了岔路口，然后站在那里，不动。\n\n「我刚才说的那些，」他开口，「谢谢你听了。」\n\n「谢什么，」你说，「说出来不亏，藏着亏。」\n\n他哼了一声，算是笑，但也算是别的什么。\n\n「你这人说话很奇怪，」他说，「但还行。」\n\n你笑了。「你也是。」\n\n他不再说话，转身走了，背影在夜色里消失。\n\n你站在岔路口，心里有一种很难描述的东西。\n\n你见过很多看起来硬的人，大多数人硬在外面，里面是空的。马奎不一样——他的硬是从里到外的，但也正因为这样，当那个里面也承受着重量的时候，他不知道往哪里放，也没有人告诉他，可以说出来。\n\n而你现在告诉他了。\n\n可以说出来。\n\n后来你们之间多了一个习惯。\n\n每次加班到很晚的时候，他会走到你办公室门口，说一句话。\n\n「走吗？」\n\n就两个字。没有多余的。\n\n你就站起来，跟他一起走。\n\n你们走在天津的街道上，不说话，就那样一前一后地走着。有时候他走在前面，有时候你走在前面。但走到岔路口的时候，他总会停下来，等你走到和他并肩的位置。\n\n不是刻意等——是他就是那种会做这种事的人。\n\n有一次你问他：「你为什么每次都等我？」\n\n「因为你走得太快了。」他说。\n\n「我慢点不就行了？」\n\n「不行，」他说，「你快了，我就得快点。你慢了，我就得慢点。这样才公平。」\n\n你看着他，不知道该怎么回答。\n\n他看着前面，表情平静，像是在说一件理所当然的事。\n\n但你知道那不是理所当然。\n\n那是他在用自己的方式告诉你——你不需要改变你的节奏，因为有人愿意配合你。\n\n在这个所有人都要求你「快点」或者「慢点」的世界里，有一个人说「你什么节奏都行，我来配合你」。\n\n这比任何情话都让你觉得踏实。"},xie_ruolin:{n:"谢若林",g:"m",f:"党通局/情报贩子",tt:"只认钱的聪明人",s:{"loyalty": 1, "bravery": 3, "rebel": 7, "wisdom": 7, "depth": 4, "morals": 2, "adventure": 7, "humor": 7},r:"你比大多数人都看得透。你知道这个世界的规则是利益，所以你选择站在钱这边。你不信任何主义，但你活得比那些满口信仰的人更自在。你的弱点是：你以为钱能解决一切。",tb:"你第一次见到谢若林，他正在和人讨价还价。\n\n不是买东西，是在商量一份情报的价钱。他坐在那个茶馆的角落里，表情愉快，像是在谈一件很有趣的生意，毫不掩饰他对这笔交易的热情。\n\n你在另一张桌子坐下来，假装喝茶，实际上听着他们的对话。\n\n他最终以一个你觉得让对方亏大了的价格成交了，然后很满意地靠在椅背上，招手叫伙计再来一壶好茶。\n\n你走过去，坐在他对面。\n\n他看了你一眼。「你是谁？」\n\n「路过的。」你说，「你刚才那笔买卖，那个情报的价值，你估低了三成。」\n\n他愣了一下，然后重新认真地打量了你。「你怎么知道？」\n\n「因为他答应得太快了。」你说，「一个真的在乎钱的人，不会这么快答应。他快速答应，说明他觉得你给的价格，已经比他预期的高了。」\n\n谢若林看着你，然后慢慢地笑了起来。\n\n「你这人有点意思。」他说。\n\n「你这人也有点意思。」你回了一句，「在这行，公开谈钱的人不多。」\n\n「为什么不公开？」他把那壶茶的另一个杯子推到你面前，「我不觉得在乎钱有什么问题。这世道，有钱才能活，活着才能做事，做事才能有用。这个逻辑有什么错的？」\n\n你接过那杯茶，喝了一口。「没错。」\n\n他看你的眼神变了一点，变得多了几分真正的兴趣。「但你觉得有地方不对。」\n\n「我觉得，」你说，「一个只认钱的人，很难被信任。」\n\n「谁需要被信任？」他说，「生意嘛，谁出价高就和谁合作，没什么信任不信任的。」\n\n「你不觉得这样很孤独吗？」\n\n他停住了，看着你，然后他的表情变了——不是那种「被说中了」的变，而是一种更细腻的、像是什么东西在他心里动了一下的变化。\n\n然后他很快就把那个表情收回去了，重新笑了起来。「孤独？我交朋友多了去了。」\n\n「但你信任他们吗？」\n\n他不说话了，低头喝茶。\n\n——\n\n你们后来见过很多次。不是刻意的——他出现在很多地方，你也出现在很多地方，天津就这么大，碰上是早晚的事。\n\n每次碰上，他总会和你说上几句话。有时候是闲话，有时候是工作，有时候是他突然冒出来的一句让你意外的话。\n\n「你为什么进这一行？」有一次他这么问你。\n\n「做事。」你说。\n\n「做什么事？」\n\n「让该发生的事发生，让不该发生的事不发生。」\n\n他琢磨了一下。「那你跟我合作过的事，你觉得值吗？」\n\n这个问题他说得很随意，但你听出来了，他是认真在问的。\n\n「有些值，有些不值。」你说，「你呢？」\n\n「都值，」他说，「我拿了钱的都值。」\n\n「那如果有一天，你做了一件事，钱不够多，但那件事是对的，你还做吗？」\n\n他看着你，沉默了一会儿，然后说：「这个问题很坏。」\n\n「为什么？」\n\n「因为我答不上来。」他说，然后转开了话题。\n\n但你注意到，他转开话题的速度，比他平时快了一点。\n\n——\n\n有一次，你们在一个偶然的场合里，身处一个比较危险的状态——周围有人在观察，你们不能离开，但也不能暴露任何东西。\n\n你们就坐在那里，装作普通的认识的两个人，说着一些无关紧要的话。\n\n「如果现在出了事，」他突然压低声音，用一种极其平静的方式说，「你有没有应对方案？」\n\n「有。」你说，「你呢？」\n\n「我的方案是先把你送走。」他说。\n\n你转过头看他。「为什么？」\n\n「因为，」他停了一下，「你那个问题，关于值不值的问题，我想了很久，想明白了一件事。」\n\n「什么事？」\n\n「不是所有值不值都用钱算的。」他说，「有些事，钱算不出来。但值。」\n\n你看着他。他没有看你，眼睛盯着前方，表情平静，像是刚才说的只是一句很普通的话。\n\n但你知道那不普通。\n\n谢若林从来不说这种话。或者说，谢若林从来不对任何人说这种话。\n\n「谢若林，」你轻声说，「你刚才说的那句话。」\n\n「什么话？」\n\n「你知道哪句话。」\n\n他终于转过头，看了你一眼。他的眼睛里有一种东西，你第一次见到他讨价还价的时候他的眼睛里是没有的，现在有了。\n\n「记住就好，」他说，「别多想。」\n\n然后他转开头，继续盯着前方，平静地等着那个危险的时刻过去。\n\n——\n\n谢若林是一个你不会在小说里看到的人物，太真实了，真实到让人觉得有点刺眼。\n\n他在乎钱，他精打细算，他不会为了任何大道理牺牲自己的利益。但在这些表面之下，他是一个比大多数人都更清醒地知道这个世界是什么样子的人——所以他比大多数人都更谨慎，也比大多数人都更孤独。\n\n他的孤独不是那种「无人理解」的孤独。是那种「我知道人和人之间走近了要付代价，所以我不走近」的孤独。\n\n而你走近了他。\n\n不是因为你特别，而是因为你问了他那个问题：你做了一件对的事，但钱不够多，你还做吗？\n\n那个问题戳到了他藏在所有精明和算计下面的东西——一个人，多多少少，都有一些不是为了钱活着的部分。\n\n你看到了那个部分。\n\n他也知道你看到了。\n\n而这件事，比任何交易都让他感到，有点不一样。\n\n那次危险的事件之后，你们又见过很多次。\n\n但每次见面，你们之间都多了一种不需要言说的默契。你们不再聊「值不值」的问题——因为那个问题已经有答案了。\n\n你看到他开始在一些小事情上变得不一样。不是大变——他还是那个谢若林，那个讨价还价的谢若林。但有时候，他会在算完一笔账之后，多说一句：「这个不用算了，送你。」\n\n「为什么？」你问。\n\n「不为什么。」他说，然后转开头。\n\n你笑了。\n\n因为你知道，那个「不为什么」，就是他能给出的最接近「因为是你」的回答。"},mu_wanqiu:{n:"穆晚秋",g:"f",f:"穆连成侄女",tt:"乱世中觉醒的女人",s:{"loyalty": 2, "bravery": 3, "rebel": 8, "wisdom": 5, "depth": 8, "morals": 4, "adventure": 6, "humor": 3},r:"你外表柔弱但内心坚韧。你习惯了在男人之间周旋，但你知道那不是真正的自己。你渴望真实，渴望自由，渴望有一天不用再扮演任何角色。你的觉醒不是一瞬间的事，而是一步步挣脱束缚的过程。",tb:"你第一次见到他，是在一次你本不该参加的宴会上。\n\n你那时候还不叫穆晚秋。你叫另一个名字，一个属于另一个女人的名字——一个你被迫扮演的角色。\n\n你是穆家的小姐。穆家，天津卫有头有脸的人家。你从小被教着穿什么衣服、说什么话、什么时候该笑、什么时候该沉默。你的人生像一场排练好的戏，你只需要按照剧本走。\n\n但你不是那种会安安静静演戏的人。\n\n那次宴会，你穿着母亲给你选的旗袍，化着母亲给你挑的妆，坐在那个你不认识的男人的对面。\n\n他叫余则成。至少在那个时候，他叫这个名字。\n\n他是一个从重庆来的情报官，被派到天津来「调查」你们家。你看得出来——他不是那种真正在做调查的人。他的眼睛太安静了，安静到不像是在找什么东西，而像是在看一个人。\n\n他看你。\n\n不是那种男人看漂亮女人的看。是那种——怎么说呢——像是他看到了你旗袍下面那个不想坐在这里、不想笑、不想当穆家小姐的你。\n\n你觉得不舒服。\n\n「余先生，」你开口了，声音比你预想的要冷，「你来是调查我们家，还是来看人的？」\n\n他没有被你吓到。\n\n「都是。」他说。\n\n这个回答让你意外了。你本来以为他会否认、会解释、会用一些冠冕堂皇的话把你糊弄过去。\n\n但他说了「都是」。\n\n——\n\n后来你们见了很多次。\n\n不是因为工作——虽然工作是他们见面的借口。是因为你们两个都开始在那些借口之外，寻找更多见面的理由。\n\n他会借故来你们家，坐在客厅里和你的父亲谈一些你完全听不懂的事。但他的眼睛会时不时地扫向你。你坐在窗边看书——不是真在看，是用书挡着脸——你知道他在看你。\n\n你也会借故出现在他会去的地方。茶馆、书店、街角的咖啡馆。不是刻意的——至少你骗自己是这样说的。\n\n你们开始说话。\n\n不是那种客套的、有分寸的、社交场合该说的话。是一些真正的话。\n\n「你觉得这个世道对吗？」有一次你问他。\n\n「不对。」\n\n「那你为什么还在这里做事？」\n\n「因为如果不做事，这个世道就不会变。」\n\n你看着他。「你相信它会变吗？」\n\n「我相信会变的人。」他说，然后看着你，「比如你。」\n\n你愣了一下。\n\n「我？」\n\n「你不想坐在那个宴会上，你不想穿那件旗袍，你不想当一个「穆家小姐」。」他说，「你想当一个你自己选择的人。」\n\n你没有说话。\n\n因为他说的是对的。\n\n而且这是你第一次听到有人说出你心里一直在想、但从不敢说出来的话。\n\n——\n\n你们的感情是在一次次「不该」的对话中慢慢生长的。\n\n不该——他是余则成，你是穆晚秋。你们的身份不允许你们有超出工作之外的关系。你们的立场不允许你们有超出阵营之外的感情。你们的时代不允许你们有超出规矩之外的选择。\n\n但感情从来不管什么「不该」。\n\n有一天晚上，你偷偷跑到他的住处。不是约好的——是你自己决定要去的。\n\n他开门的时候，看到你站在那里，穿着一件深色的大衣，头发被风吹乱了，眼睛在路灯下闪着光。\n\n「你怎么来了？」\n\n「我想来。」你说。\n\n他愣了一下，然后侧身让你进来。\n\n你走进那个狭小的房间，里面只有一张床、一张桌子、一盏灯。墙上是地图和文件，桌上是笔和纸。这就是他的全部世界。\n\n「你冷吗？」他问。\n\n「不冷。」你走到窗前，看着外面黑漆漆的街道，「我来是想问你一件事。」\n\n「问吧。」\n\n「你能带我走吗？」\n\n他沉默了。\n\n你转过身，看着他。「不是现在。是有一天——当这一切都结束的时候，你能带我走吗？」\n\n他看着你，很久很久。\n\n「去哪里？」他问。\n\n「去哪里都行。」你说，「只要不是这里。只要不是穆家。只要不是那个宴会上。」\n\n他又沉默了一会儿。\n\n「好。」他说。\n\n只有一个字。但那个字的重量，你觉得比任何人对你说过的所有话都重。\n\n——\n\n穆晚秋。\n\n你不是从一开始就勇敢的。你是从遇到他开始，才慢慢变得勇敢的。\n\n他给了你一样东西——不是爱情，是看见。\n\n他看见了你旗袍下面的那个不想坐在这里的女孩。他看见了你笑容后面的那个不想笑的人。他看见了你所有那些「应该」背后的「不想」。\n\n而他告诉你——你不需要「应该」。\n\n你需要的是「想」。\n\n——\n\n后来他真的带你走了。不是像你说的那样「有一天」——是在一个你完全没有预料到的、兵荒马乱的夜里。\n\n他敲开你的门，头发上都是雨水，说了一句你等了一辈子的话。\n\n「走。」\n\n你什么都没带。你就那样跟着他跑了。\n\n跑过天津的街道，跑过你们第一次见面的那个宴会厅的前门，跑过你从小长大的那个你不想再回去的家。\n\n你跑的时候没有回头。\n\n因为你前面有一个人，你不需要回头。\n\n你只需要跟着他跑。\n\n你后来问过他，那天晚上他为什么让你进来。\n\n你们坐在那个狭小房间的床上，窗外是天津卫的夜色，远处偶尔传来几声犬吠。\n\n「因为我知道你来干什么，」他说，「你来不是问我能不能带你走。你是来告诉我，你已经准备好了。」\n\n你愣了一下。\n\n「准备好了？」\n\n「准备好离开穆家，准备好离开那个宴会，准备好当一个你自己选择的人。」他看着你，「但你不敢自己说那句话。所以你跑过来，让我替你说。」\n\n你看着他，忽然笑了。\n\n「你说得对。」\n\n「我知道。」\n\n「那你为什么当时不说破？」\n\n他沉默了一会儿。\n\n「因为如果我说破了，你就会觉得我是在可怜你。」他说，「而你不需要被可怜。你需要的是一个和你一起走的人。」\n\n你靠在他肩膀上。\n\n「你是吗？」你问。\n\n「我是。」他说。\n\n就这三个字。但他说的方式，让你知道这不是一个回答，是一个承诺。\n\n——\n\n穆晚秋。\n\n你的人生是从遇到他开始重新开始的。\n\n不是因为他说「走」你就走了。\n\n是因为他让你知道——你本来就可以走。\n\n你只是需要一个在你身后说「走」的人。"},zuo_lan:{n:"左蓝",g:"f",f:"中共军调代表",tt:"黑暗中不灭的光",s:{"loyalty": 9, "bravery": 5, "rebel": 2, "wisdom": 5, "depth": 5, "morals": 9, "adventure": 2, "humor": 1},r:"你是那个永远相信明天会更好的人。你的信念不是盲目的，而是建立在清醒认知之上的选择。你温柔但不软弱，坚定但不固执。你是那种即便在黑暗中最深处，依然能让身边的人看到光的人。",tb:"你第一次见到她，是在北平的一家书店里。\n\n不是那种你平时会去的书店——那是一家很小、很不起眼的书店，夹在两条胡同之间，门口连个招牌都没有。你是为了躲雨才进去的。\n\n她就站在书架前，手里拿着一本《新青年》，阳光从窗外照在她的头发上，泛着一层金色的光晕。\n\n你站在门口，被那场雨困住了，也被她吸引了。\n\n不是因为她漂亮——虽然她确实很好看。是因为她站在那里的方式。她不是那种在书店里闲逛的人。她是那种——怎么说呢——像是在书架前寻找什么东西的人。不是找一本书，是在找某种答案。\n\n「你也在躲雨？」她转过头看到你，笑了一下。\n\n「嗯。」你走进去，站在门口，不知道该往哪边走。\n\n「随便看。」她说，然后又低下头去看书。\n\n你随便翻了几本，但注意力始终不在书上。你在看她。\n\n她看书的样子和大多数人不一样。她不是在读——她是在「吃」。每一个字都被她认真地消化、吸收、理解。她的嘴唇偶尔会微微动一下，像是在默念什么。\n\n「你叫什么名字？」你忽然问。\n\n她抬起头看你。「左蓝。」\n\n「你呢？」\n\n你说了你的名字。\n\n她点了点头，然后说了一句让你意外的话：「你看起来不像会来这种地方的人。」\n\n「为什么？」\n\n「因为你穿得太好了。」她看了看你的衣服，「来这种地方的人，都是被雨淋湿之后跑进来的。你不是。你是走着来的，只是顺便带了把伞。」\n\n你愣了一下，然后笑了。「被你看穿了。」\n\n她也笑了。「不是我厉害，是你太明显。」\n\n——\n\n从那之后，你开始经常去那家书店。\n\n不是因为想看书——是因为想见她。\n\n每次你去的时候，她都在。有时候在看书，有时候在整理书架，有时候只是坐在那里发呆。你走过去，坐在她旁边，你们就开始说话。\n\n你们聊书，聊外面的世界，聊你们各自的生活。她说她是一个老师，在北平的一所小学教书。你说你是一个——你犹豫了一下——做生意的人。\n\n「什么生意？」她问。\n\n「各种。」你说。\n\n她看着你，没有追问。\n\n但你看得出来，她知道你在隐瞒什么。她只是不问。\n\n——\n\n有一天，她没有来书店。\n\n你等了一个下午，她没有出现。你等到书店关门，站在门口，看着空荡荡的街道，心里有一种你以前从未有过的感觉。\n\n你后来才知道，她不是不想来——她是不敢来。\n\n左蓝不是一个普通的小学老师。她是地下党。她在那个小小的书店里见的人，不是随便来的读者——是她要发展的对象。\n\n而她那天没来，是因为她的一个同志被捕了。整个联络点被暴露了，她不得不躲起来。\n\n但你不知道这些。你只知道她没有来。\n\n你第二天去了，第三天去了，第四天去了。\n\n她都没有来。\n\n第五天，你走进书店，发现老板在收拾东西。\n\n「这家店要关了？」你问。\n\n「老板被抓了。」他说，声音压得很低，「你别再来这里了。」\n\n你站在那里，觉得整个世界都塌了一角。\n\n不是因为书店关了——是因为你害怕。不是害怕被牵连，是害怕她出了事。\n\n你在那个关门的书店门口站了很久。雨又开始下，和你第一次遇见她的那天一样。\n\n然后你听到了一个声音。\n\n「你怎么还在这里？」\n\n你转过身。\n\n她站在那里。穿着一件你从未见过的深色外套，头发被雨淋湿了，贴在脸上，脸色有些苍白。\n\n但她在笑。\n\n「你——」你不知道该说什么，「你没事？」\n\n「没事。」\n\n「这几天你去哪了？」\n\n「躲着。」\n\n「为什么？」\n\n她看着你，犹豫了一下。然后她做了一个决定。\n\n「你想知道我是谁吗？」她问。\n\n「想。」\n\n「那我告诉你。」她走进那家已经关门的书店，站在那些空荡荡的书架中间，看着你，「我不是小学老师。」\n\n「我知道。」\n\n她愣了一下。「你知道？」\n\n「你不像。」你说，「一个普通的小学老师不会那样看书——像是在找答案，不是在识字。」\n\n她又愣住了。然后她笑了。\n\n「那你觉得我是什么？」\n\n「我觉得……」你想了想，「你是一个在做一件很重要的事的人。」\n\n她没有立刻回答。她看着你，很久很久。\n\n「是的，」她最终说，「我在做一件很重要的事。但这件事很危险。如果我告诉你，你可能也会被卷进来。」\n\n「我不怕。」你说。\n\n「你应该怕。」\n\n「我应该怕，」你看着她，「但我不想怕到失去你。」\n\n她沉默了。\n\n然后她走过来，握住你的手。她的手很凉，凉到让你心都颤了一下。\n\n「你知道吗，」她说，声音轻得像是在自言自语，「我做这件事，不是为了我自己。」\n\n「那为了什么？」\n\n「为了以后的人，不用再做这件事。」\n\n你握紧了她的手。\n\n「那我帮你。」你说。\n\n她没有说话。但她的手没有松开。\n\n你们就那样站在那个空荡荡的书店里，站在那些被搬空的书架中间，手握着手。\n\n外面下着雨。\n\n——\n\n左蓝是一个你永远无法完全拥有的人。\n\n因为她的爱不只属于你——她还爱着那个她正在为之战斗的世界。\n\n但你从来没有嫉妒过那个世界。\n\n因为她让你知道，一个人的爱可以很大——大到不仅装得下一个具体的人，也装得下所有人。\n\n而你能做的最好的事，不是把她从那个世界里拉回来。\n\n是陪她一起，让那个世界变成她想要的样子。\n\n这就是你爱她的方式。\n\n不是在阳光下牵她的手——\n\n是在黑暗中，做她的那束不灭的光。"},hong_mishu:{n:"洪秘书",g:"f",f:"军统天津站秘书",tt:"最安静的守护者",s:{"loyalty": 4, "bravery": 1, "rebel": 1, "wisdom": 7, "depth": 8, "morals": 5, "adventure": 1, "humor": 1},r:"你是那个在角落里默默做着一切的人。你不说话，但你什么都知道。你不站队，但你心里有杆秤。你的力量不在于你做了什么惊天动地的事，而在于你在每一个关键时刻，都选择了做正确的那件小事。",tb:""},dai_li:{n:"戴笠",g:"m",f:"军统局长",tt:"令人敬畏的传奇",s:{"loyalty": 3, "bravery": 8, "rebel": 3, "wisdom": 7, "depth": 4, "morals": 1, "adventure": 9, "humor": 1},r:"你是一个天生的领导者。你的气场让人不自觉地服从。你做事果断、手段强硬，你相信目标可以证明手段。你的魅力和危险是一体两面——追随你的人都愿意为你赴死，但你也会毫不犹豫地牺牲他们。",tb:"你第一次见到戴笠，是在一个你本不该出现的场合。\n\n不是密室汇报，不是什么秘密会议。是一个普通的档案室，你在整理一批旧文件，他推开门进来，看了你一眼，然后走到书架前，找了一份东西，又走了。\n\n全程没有说一句话。\n\n但你注意到了一件事——他在转身离开之前，眼睛在你身上停了大概两秒钟。\n\n不是那种检阅的目光，也不是那种评估威胁的目光。是一种你没有完全读出来，但觉得被认真地看了一眼的感觉。\n\n你后来见过的很多人，他们看人的时候是扫视的，快速的，像是在做分类，把眼前这个人放进某个格子里就结束了。戴笠的目光不一样，他看人是真的在看，像是要把这个人这一刻的状态，完整地记下来。\n\n那两秒钟让你有点不自在，但也让你记住了他。\n\n——\n\n第二次有意义的接触，是在一次他的工作汇报之后。\n\n所有人都走了，你因为要收拾会议记录留到了最后。他也没有立刻走，坐在那里，看着桌上的文件。\n\n「那份建议，」他忽然开口，「你写的？」\n\n「是。」\n\n他拿起那份文件，翻了翻，然后抬起头看你。「里面的第三条，关于情报网络的重建方案——是谁教你的？」\n\n「没有人教。是我自己想的。」\n\n他又看了你一会儿，然后把文件放下来。「不错。」\n\n这两个字从别人嘴里说出来可能不算什么。但戴笠说「不错」的时候，他的表情和语气是认真的。那不是敷衍，是他在用自己的方式告诉你：你做的这件事，他认可了。\n\n你微微点了点头，什么都没说，继续收拾文件。\n\n但他没有走。\n\n「你进这行多久了？」他问。\n\n「三年。」\n\n「三年就能写出这种东西，」他说，「你不该只待三年。」\n\n你抬起头看他。这句话的分量你听懂了——不是表扬，是判断。戴笠不会随便表扬人，他判断一个人有没有价值，然后告诉你。\n\n「那您觉得我该待多久？」你问。\n\n他没有立刻回答。他看了你很长时间，然后说了一句让你意外的话：「你不怕吗？」\n\n「怕什么？」\n\n「怕有一天，你发现你自己成了你不想成为的人。」\n\n你沉默了一会儿。\n\n「怕。」你说。\n\n「那你还做？」\n\n「因为怕了还是做，才叫勇气。」你看着他，「这话我以前也说过一次，对另一个人。他现在已经不在了。」\n\n戴笠的目光动了一下。不是怜悯，不是同情——是某种更深的东西，像是他在那个瞬间看到了某种他自己也经历过的事情。\n\n「你说的对。」他说。\n\n这是他第一次对你说出「你说的对」这三个字。\n\n——\n\n后来的日子里，你们的交集并不多，但每一次交集都让你觉得不一样。\n\n他对你的态度始终是一种「远距离的关注」——他不会来找你聊天，不会问你的私事，不会在公共场合表现出对你的任何特殊关照。但你知道，他在看。\n\n每一次你做了一个决定，每一次你交了一份报告，每一次你在某个关键的时候做出了选择——他都知道。\n\n不是因为他派人盯着你。是因为他记得你，记得你在档案室里整理文件的样子，记得你在会议上不说话但眼睛一直在看的样子，记得你说「怕」的时候那种很平静但很真实的语气。\n\n有一次，他忽然出现在你的办公桌前，放下一份文件。\n\n「看一下。」他说。\n\n你打开文件，里面是一个人的详细资料——一个你从未听说过的人。\n\n「这是什么？」\n\n「一个你需要认识的人。」他说，「以后你会用到他。」\n\n「为什么是我？」\n\n他看着你，沉默了一秒钟，然后说了一句让你至今想起来都觉得心动的回答：\n\n「因为只有你值得。」\n\n不是「只有你合适」。不是「只有你方便」。\n\n是「只有你值得」。\n\n这三个字比任何表扬、任何任命、任何奖励都重。\n\n——\n\n戴笠是这个世界上最难接近的人之一。他不是那种你能和他交朋友的人——他的存在本身就像一座山，你只能仰望，无法企及。\n\n但他对你，做了一件他几乎不对任何人做的事——他记住了你。\n\n不是记住了你的能力，不是记住了你的价值，而是记住了你在档案室里整理文件的样子，记住了你说「怕」的时候的样子。\n\n而你，是被那个让人仰望的人，认真地看了一眼、记住了一生的人。\n\n那种被看见的感觉，比任何传奇都让你觉得，自己活着这件事，是有意义的。\n\n那之后，他再也没有亲自给你送过文件。但每一次他派人送来的东西里，都会夹着一张很小的纸条——不是正式内容，是手写的几个字，有时候是「注意身体」，有时候是「今天天气不好」，有时候只画了一个很简单的圈。\n\n那些纸条没有人会注意到。它们被夹在情报文件的最后一页，只有翻看完整份文件的人才会发现。而你每一次都会翻到最后。\n\n因为你知道，他在那等你。\n\n——\n\n你后来问过他一句话：「你为什么记得我？」\n\n你们站在他办公室的窗前，外面是天津卫的黄昏，整个城市被落日染成了暖橙色。\n\n他没有立刻回答。\n\n「因为我见过太多的人了，」他终于说，「大多数的人，我看一眼就知道他们会成为什么样子。但你不是。」\n\n「我是什么？」\n\n「你是……」他想了一下，「一个让我觉得，也许这个世界没有我想的那么糟的人。」\n\n你没有说话。\n\n他也没有说话。\n\n你们就那样站在窗前，看着黄昏一点一点变成夜晚。\n\n但你知道吗——\n\n在那个黄昏里，你比任何人都更清楚地看到了一件事。\n\n戴笠不是一座山。\n\n他是一个人。一个也会害怕、也会孤独、也会在黄昏的窗前站很久的人。\n\n而他允许你看到了这一点。"},wu_taitai:{n:"吴太太",g:"f",f:"站长太太",tt:"最清醒的旁观者",s:{"loyalty": 1, "bravery": 1, "rebel": 1, "wisdom": 7, "depth": 5, "morals": 3, "adventure": 1, "humor": 9},r:"你是那个看透一切但选择装傻的人。你知道什么时候该说什么话，什么时候该闭嘴。你的智慧不是用来改变世界的，是用来好好活着的。在那个满是枪和秘密的地方，你选择打麻将、嗑瓜子、缝衣服。而恰恰是这种选择，让你活得最久。",tb:""}};
const QS=[{"id": 1, "text": "深夜街头，一个陌生人在你对面走来，脚步很快。你的第一反应是？", "options": [{"text": "自然走过，不做任何反应", "scores": {"wisdom": 2, "depth": 2}}, {"text": "下意识把手伸进口袋握住东西", "scores": {"bravery": 2, "adventure": 1}}, {"text": "快速扫一眼对方的脸和手", "scores": {"loyalty": 1, "wisdom": 2, "depth": 1}}, {"text": "绕开走，多一事不如少一事", "scores": {"humor": 1, "adventure": 2}}]}, {"id": 2, "text": "你发现最信任的人一直在对你撒谎，你会？", "options": [{"text": "当面揭穿，必须有个说法", "scores": {"bravery": 2, "morals": 2}}, {"text": "装作不知道，暗中观察", "scores": {"wisdom": 2, "depth": 2}}, {"text": "试探对方，看能问到什么程度", "scores": {"adventure": 2, "rebel": 1}}, {"text": "难过但选择原谅", "scores": {"loyalty": 2, "morals": 1}}]}, {"id": 3, "text": "你的信仰是什么？", "options": [{"text": "为了国家和民族的未来", "scores": {"loyalty": 2, "morals": 2}}, {"text": "为了让身边的人过上更好的日子", "scores": {"loyalty": 1, "depth": 2}}, {"text": "为了证明自己比别人强", "scores": {"bravery": 1, "adventure": 2}}, {"text": "说实话，我没想过这个问题", "scores": {"humor": 2, "rebel": 1}}]}, {"id": 4, "text": "一个重要的机会摆在面前，但需要你背叛一个朋友。你选？", "options": [{"text": "绝不背叛朋友，机会可以再找", "scores": {"loyalty": 2, "morals": 2}}, {"text": "看这个机会值不值得", "scores": {"wisdom": 1, "adventure": 2}}, {"text": "想办法两全其美", "scores": {"wisdom": 2, "depth": 1}}, {"text": "先答应下来，后面再说", "scores": {"rebel": 2, "bravery": 1}}]}, {"id": 5, "text": "你被安排到一个完全陌生的环境，身边没有认识的人。你的状态是？", "options": [{"text": "紧张但迅速适应，找到生存方式", "scores": {"bravery": 2, "adventure": 2}}, {"text": "先观察，摸清情况再行动", "scores": {"wisdom": 2, "depth": 1}}, {"text": "有点慌，但会努力融入", "scores": {"loyalty": 1, "humor": 2}}, {"text": "觉得无所谓，反正到哪都一样", "scores": {"rebel": 2, "depth": 1}}]}, {"id": 6, "text": "你的上司让你做一件你觉得不道德的事。你？", "options": [{"text": "坚决不做，宁可丢工作", "scores": {"morals": 2, "bravery": 2}}, {"text": "表面答应，暗中不做", "scores": {"wisdom": 2, "rebel": 1}}, {"text": "做了，但心里不舒服", "scores": {"loyalty": 2, "depth": 1}}, {"text": "先问问有没有好处再说", "scores": {"adventure": 1, "rebel": 2}}]}, {"id": 7, "text": "你觉得人与人之间最重要的是什么？", "options": [{"text": "信任", "scores": {"loyalty": 2, "morals": 1}}, {"text": "利益", "scores": {"wisdom": 1, "rebel": 2}}, {"text": "共同的目标", "scores": {"loyalty": 1, "bravery": 2}}, {"text": "互相理解", "scores": {"depth": 2, "humor": 1}}]}, {"id": 8, "text": "如果有一天你可以离开现在的生活，去任何地方做任何事。你会？", "options": [{"text": "开个书店，安安静静地过日子", "scores": {"depth": 2, "wisdom": 1}}, {"text": "去前线，做真正有意义的事", "scores": {"bravery": 2, "adventure": 2}}, {"text": "赚够钱，环游世界", "scores": {"adventure": 2, "rebel": 1}}, {"text": "陪在爱的人身边，哪也不去", "scores": {"loyalty": 2, "depth": 1}}]}, {"id": 9, "text": "别人对你的评价和你真实的自己，差距有多大？", "options": [{"text": "差距很大，没人真正了解我", "scores": {"depth": 2, "wisdom": 1}}, {"text": "差不多，我就是表面看起来那样", "scores": {"humor": 2, "loyalty": 1}}, {"text": "别人只看到了一部分", "scores": {"depth": 1, "bravery": 1}}, {"text": "我故意让别人误解我", "scores": {"rebel": 2, "wisdom": 1}}]}, {"id": 10, "text": "你最害怕什么？", "options": [{"text": "背叛", "scores": {"loyalty": 2, "morals": 1}}, {"text": "被遗忘", "scores": {"depth": 2, "bravery": 1}}, {"text": "一事无成", "scores": {"adventure": 2, "bravery": 1}}, {"text": "活着但没有意义", "scores": {"morals": 2, "depth": 1}}]}, {"id": 11, "text": "朋友向你借钱，但你明知道他不会还。你？", "options": [{"text": "借，当是帮他", "scores": {"loyalty": 2, "morals": 1}}, {"text": "不借，实话实说", "scores": {"bravery": 1, "humor": 1}}, {"text": "借一部分，当是送他的", "scores": {"wisdom": 2, "depth": 1}}, {"text": "想办法让他用别的方式还", "scores": {"adventure": 1, "wisdom": 1}}]}, {"id": 12, "text": "如果必须在一个危险的夜晚做出选择，你会？", "options": [{"text": "冲在最前面，保护身后的人", "scores": {"bravery": 2, "loyalty": 2}}, {"text": "藏在暗处，等最佳时机", "scores": {"wisdom": 2, "depth": 1}}, {"text": "先撤，活着才能继续", "scores": {"adventure": 1, "rebel": 1}}, {"text": "拉着身边的人一起想办法", "scores": {"loyalty": 1, "humor": 2}}]}, {"id": 13, "text": "你在一个重要场合说错了话，让自己陷入了麻烦。你怎么处理？", "options": [{"text": "立刻道歉，承认错误", "scores": {"morals": 2, "bravery": 1}}, {"text": "用另一句话把前面的话圆回去", "scores": {"wisdom": 2, "depth": 1}}, {"text": "装作没说过，看对方反应", "scores": {"rebel": 1, "wisdom": 1}}, {"text": "主动转移话题", "scores": {"humor": 2, "adventure": 1}}]}, {"id": 14, "text": "深夜收到一封陌生信件，里面只有一个地址和一个时间。你？", "options": [{"text": "按时去，看看是什么", "scores": {"adventure": 2, "bravery": 2}}, {"text": "先查清楚这个地址是什么地方", "scores": {"wisdom": 2, "depth": 1}}, {"text": "不去，太危险", "scores": {"morals": 1, "loyalty": 1}}, {"text": "去，但提前做好应对准备", "scores": {"wisdom": 1, "bravery": 1, "adventure": 1}}]}, {"id": 15, "text": "你发现你的任务和你的良心产生了冲突。你选？", "options": [{"text": "任务第一，个人感情要放下", "scores": {"loyalty": 2, "bravery": 1}}, {"text": "良心第一，任务可以找借口搪塞", "scores": {"morals": 2, "rebel": 1}}, {"text": "找到一个两全其美的办法", "scores": {"wisdom": 2, "depth": 2}}, {"text": "先把任务做完，事后再弥补", "scores": {"loyalty": 1, "depth": 1}}]}, {"id": 16, "text": "你看到一个小孩在街上哭泣，身边没有大人。你？", "options": [{"text": "立刻上前询问，帮他找父母", "scores": {"morals": 2, "bravery": 1}}, {"text": "先观察一下情况再决定要不要上前", "scores": {"wisdom": 2, "depth": 1}}, {"text": "找一个路过的大妈帮忙", "scores": {"humor": 1, "adventure": 1}}, {"text": "悄悄跟着确保他安全，不露面", "scores": {"depth": 2, "loyalty": 1}}]}, {"id": 17, "text": "有人比你更早得到了你应得的奖赏。你的感受是？", "options": [{"text": "愤怒，这不公平", "scores": {"bravery": 1, "rebel": 2}}, {"text": "失落，但能理解", "scores": {"depth": 2, "morals": 1}}, {"text": "无所谓，机会还有", "scores": {"adventure": 1, "humor": 1}}, {"text": "想弄清楚为什么，下次做得更好", "scores": {"wisdom": 2, "loyalty": 1}}]}, {"id": 18, "text": "你必须在两个朋友之间选边站。你怎么做？", "options": [{"text": "选我认为更有道理的那个", "scores": {"morals": 2, "bravery": 1}}, {"text": "保持中立，两边都不得罪", "scores": {"wisdom": 2, "depth": 1}}, {"text": "选对我更重要的那个", "scores": {"loyalty": 2, "depth": 1}}, {"text": "找机会让他们和解，不选边", "scores": {"humor": 1, "morals": 1}}]}, {"id": 19, "text": "你的工作需要你长期远离家人，无法联系。你的态度是？", "options": [{"text": "接受，这是我选择的路", "scores": {"loyalty": 2, "bravery": 2}}, {"text": "难受，但撑着", "scores": {"depth": 2, "morals": 1}}, {"text": "想办法偷偷联系", "scores": {"rebel": 2, "adventure": 1}}, {"text": "把对家人的想念转化为工作的动力", "scores": {"loyalty": 1, "depth": 1, "wisdom": 1}}]}, {"id": 20, "text": "你注意到一个同事在撒谎，但这个谎言对你没有直接影响。你？", "options": [{"text": "不管，又不关我的事", "scores": {"rebel": 1, "adventure": 1}}, {"text": "私下提醒他说谎是有风险的", "scores": {"morals": 1, "wisdom": 1}}, {"text": "记在心里，以后可能有用", "scores": {"wisdom": 2, "depth": 2}}, {"text": "找机会当面揭穿，讨厌欺骗", "scores": {"morals": 2, "bravery": 1}}]}, {"id": 21, "text": "面对一件无法改变的错误，你的方式是？", "options": [{"text": "承认它，然后往前走", "scores": {"bravery": 2, "morals": 1}}, {"text": "分析为什么出错，以后避免", "scores": {"wisdom": 2, "depth": 1}}, {"text": "试图弥补，哪怕可能性很低", "scores": {"loyalty": 2, "adventure": 1}}, {"text": "放下它，过去的事就是过去了", "scores": {"rebel": 1, "humor": 1}}]}, {"id": 22, "text": "如果你只能选一种能力，你会选？", "options": [{"text": "看穿别人心思的能力", "scores": {"wisdom": 2, "depth": 2}}, {"text": "让所有人都相信你的能力", "scores": {"rebel": 1, "adventure": 2}}, {"text": "预见危险的能力", "scores": {"bravery": 1, "loyalty": 1}}, {"text": "永远不被人注意的能力", "scores": {"depth": 2, "wisdom": 1}}]}, {"id": 23, "text": "如果有人说你变了，你的回应是？", "options": [{"text": "我没有变，你只是以前没看清楚我", "scores": {"depth": 2, "rebel": 1}}, {"text": "也许吧，人本来就应该变", "scores": {"adventure": 1, "wisdom": 1}}, {"text": "哪里变了？我觉得我一直是这样的", "scores": {"loyalty": 1, "humor": 1}}, {"text": "变了又怎样，那又如何", "scores": {"rebel": 2, "bravery": 1}}]}, {"id": 24, "text": "身处险境时，你最先想到的是？", "options": [{"text": "怎么脱身", "scores": {"wisdom": 2, "adventure": 1}}, {"text": "身边还有谁需要我保护", "scores": {"loyalty": 2, "bravery": 1}}, {"text": "谁把我陷入这个境地的", "scores": {"depth": 2, "rebel": 1}}, {"text": "现在能用什么资源", "scores": {"wisdom": 1, "bravery": 1}}]}, {"id": 25, "text": "你最在意别人的哪种评价？", "options": [{"text": "说你不可信任", "scores": {"loyalty": 2, "morals": 1}}, {"text": "说你没能力", "scores": {"bravery": 1, "adventure": 1}}, {"text": "说你虚伪", "scores": {"depth": 2, "morals": 1}}, {"text": "说你没有立场", "scores": {"rebel": 1, "morals": 1}}]}, {"id": 26, "text": "如果你被迫表演一个与自己截然相反的角色，你会？", "options": [{"text": "尽力演好，既然必须做就做到最好", "scores": {"loyalty": 1, "bravery": 2}}, {"text": "在表演中留一点真实的自己", "scores": {"depth": 2, "rebel": 1}}, {"text": "把它当成一种体验和修炼", "scores": {"adventure": 2, "wisdom": 1}}, {"text": "心里始终清楚自己是谁就够了", "scores": {"morals": 2, "depth": 1}}]}, {"id": 27, "text": "你觉得孤独是一种？", "options": [{"text": "惩罚，我需要身边有人", "scores": {"loyalty": 2, "humor": 1}}, {"text": "常态，我习惯了", "scores": {"depth": 2, "rebel": 1}}, {"text": "力量，孤独让我更清醒", "scores": {"wisdom": 2, "depth": 1}}, {"text": "选择，我可以选择不孤独", "scores": {"adventure": 1, "bravery": 1}}]}, {"id": 28, "text": "你最愿意在什么时刻冒险？", "options": [{"text": "保护我在乎的人", "scores": {"loyalty": 2, "bravery": 2}}, {"text": "完成一件我认为正确的事", "scores": {"morals": 2, "bravery": 1}}, {"text": "当利益足够大的时候", "scores": {"adventure": 2, "rebel": 1}}, {"text": "当我已经没有退路", "scores": {"depth": 1, "bravery": 1}}]}, {"id": 29, "text": "你认为秘密应该带进坟墓吗？", "options": [{"text": "是，有些事没有必要让别人知道", "scores": {"depth": 2, "loyalty": 1}}, {"text": "不，秘密是一种负担", "scores": {"morals": 1, "humor": 1}}, {"text": "看是什么秘密", "scores": {"wisdom": 2, "rebel": 1}}, {"text": "我会告诉我最信任的那个人", "scores": {"loyalty": 2, "depth": 1}}]}, {"id": 30, "text": "如果你即将离开这座城市，永远不会再回来，你最想做的最后一件事是？", "options": [{"text": "见一个人，说一句一直没说出口的话", "scores": {"depth": 2, "loyalty": 2}}, {"text": "在街上走一圈，把一切都记在心里", "scores": {"depth": 1, "humor": 1}}, {"text": "把手头的事情尽量做完", "scores": {"loyalty": 1, "morals": 1}}, {"text": "什么都不做，干净地离开", "scores": {"rebel": 2, "bravery": 1}}]}, {"id": 31, "text": "如果你有一天不得不和昔日最亲密的人站在对立面，你会？", "options": [{"text": "先想办法化解，不到最后不撕破脸", "scores": {"wisdom": 2, "loyalty": 1}}, {"text": "对事不对人，立场不同但感情还在", "scores": {"depth": 2, "morals": 1}}, {"text": "既然走到这一步，就不要心软", "scores": {"bravery": 2, "rebel": 1}}, {"text": "找机会悄悄提醒对方，给彼此留余地", "scores": {"loyalty": 2, "wisdom": 1}}]}, {"id": 32, "text": "在一切都结束之后，你最希望被人记住的是什么？", "options": [{"text": "我做到了我答应的事", "scores": {"loyalty": 2, "morals": 2}}, {"text": "我比所有人都聪明", "scores": {"wisdom": 1, "rebel": 1}}, {"text": "我从来没有背叛过自己", "scores": {"depth": 2, "morals": 1}}, {"text": "我让身边的人过得好一点", "scores": {"loyalty": 1, "humor": 1}}]}];

const DIMS=['loyalty','bravery','rebel','wisdom','depth','morals','adventure','humor'];
let qi=0,sc={},cqs=[],gender='';

function sh(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function start(){
  sw('intro','quiz');
  cqs=sh(QS).slice(0,10);
  sc={};DIMS.forEach(d=>sc[d]=0);qi=0;showQ();
}

function sw(from,to){
  document.getElementById(from).classList.remove('active');
  document.getElementById(to).classList.add('active');
}

function showQ(){
  let q=cqs[qi];
  document.getElementById('qt').textContent=q.text;
  document.getElementById('pb').style.width=(qi/10*100)+'%';
  document.getElementById('qn').textContent='第'+(qi+1)+'题';
  let od=document.getElementById('os');od.innerHTML='';
  sh(q.options).forEach(opt=>{
    let b=document.createElement('button');b.className='opt';b.textContent=opt.text;
    b.onclick=()=>pick(opt.scores,b);od.appendChild(b);
  });
  let c=document.getElementById('qc');c.classList.remove('fi');void c.offsetWidth;c.classList.add('fi');
}

function pick(s,btn){
  document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  for(let k in s)sc[k]=(sc[k]||0)+s[k];
  setTimeout(()=>{qi++;if(qi>=10)sw('quiz','gender');else showQ()},350);
}

function pickG(g,el){
  gender=g;
  document.querySelectorAll('.gcard').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  setTimeout(()=>{sw('gender','loading');setTimeout(calc,2200)},500);
}

function calc(){
  let tg=gender==='male'?'f':'m';
  let scores=[];
  for(let id in CHARS){
    let c=CHARS[id];
    if(c.g!==tg) continue;
    let dist=0;
    DIMS.forEach(d=>{
      let cv=c.s[d]||0, uv=(sc[d]||0)/2;
      dist+=(cv-uv)*(cv-uv);
    });
    scores.push({id,dist,c});
  }
  scores.sort((a,b)=>a.dist-b.dist);
  // 全量候选池加权随机 + 保底权重
  let ws=scores.map(x=>1/(x.dist+1));
  let avgW=ws.reduce((a,b)=>a+b,0)/ws.length;
  ws=ws.map(w=>Math.max(w, avgW*0.25));
  let tw=ws.reduce((a,b)=>a+b,0);
  let rnd=Math.random()*tw,cum=0,pick=scores[0];
  for(let i=0;i<scores.length;i++){cum+=ws[i];if(rnd<=cum){pick=scores[i];break;}}
  let maxD=DIMS.length*10*10;
  let pct=Math.round((1-Math.sqrt(pick.dist)/Math.sqrt(maxD))*55+40);
  pct=Math.min(98,Math.max(52,pct));
  showR(pick.id,pick.c,pct);
}

function showR(id,c,pct){
  sw('loading','result');
  let story=c.tb||'';
  let paras=story.split('\n').filter(p=>p.trim());
  let h='';
  h+='<div class="mpct">'+pct+'<span style="font-size:.4em">%</span></div>';
  h+='<div class="mlbl">命 运 羁 绊 匹 配 度</div>';
  h+='<div class="divider" style="width:80px;margin:10px auto"></div>';
  h+='<div class="faction-tag">'+c.f+'</div>';
  h+='<div class="cname">'+c.n+'</div>';
  h+='<div class="ctitle">'+c.tt+'</div>';
  h+='<div class="reason">'+c.r+'</div>';
  if(paras.length){
    h+='<div class="story">';
    h+='<div class="stitle">— '+c.tt+' —</div>';
    paras.forEach(p=>h+='<p>'+p+'</p>');
    h+='</div>';
  }
  document.getElementById('rc').innerHTML=h;
}

function restart(){
  sw('result','intro');
  document.querySelectorAll('.gcard').forEach(c=>c.classList.remove('sel'));
}
</script>
